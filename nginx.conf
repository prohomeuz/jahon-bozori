# ── Nginx: React SPA + API reverse proxy ─────────────────────────────────────

# Gzip compression — bandwidth tejash
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript
           application/xml+rss application/atom+xml image/svg+xml;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SSE (Server-Sent Events) — buffering o'chiriladi ─────────────────────
    # /api/events endpoint real-time yangilanishlar uchun
    location /api/events {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection '';

        # SSE uchun muhim — buffering o'chiriladi
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding on;
    }

    # ── API proxy → backend container ────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # Timeout'lar
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── index.html — hech qachon cache'ga olinmasin ──────────────────────────
    # React Router ishlashi uchun muhim
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── Static assets — 1 yil cache (Vite content hash ishlatadi) ────────────
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|webp|avif|svg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA routing — React Router uchun ─────────────────────────────────────
    # /about, /dashboard kabi URL'lar 404 bermasin
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
